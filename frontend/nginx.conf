server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Allow large request bodies (e.g. future uploads); responses like clip
    # previews are served back through this proxy too.
    client_max_body_size 100m;

    # Reverse-proxy API calls to the backend. The trailing slash on proxy_pass
    # strips the /api prefix, so /api/config -> backend /config, etc.
    # "backend" is the compose service name on the shared network.
    location /api/ {
        proxy_pass http://backend:8051/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Scans run as background tasks (return quickly), but keep generous
        # timeouts for the occasional slow probe/preview generation.
        proxy_read_timeout 300s;
    }

    # SPA fallback: let the Angular router handle client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
